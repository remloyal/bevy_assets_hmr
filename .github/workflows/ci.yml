name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.mode }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mode: default
          - os: windows-latest
            mode: default
          - os: ubuntu-latest
            mode: no-default
          - os: windows-latest
            mode: no-default

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.mode }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.mode }}-

      - name: Test default features
        if: matrix.mode == 'default'
        run: cargo test --all-targets --locked

      - name: Check without default features
        if: matrix.mode == 'no-default'
        run: cargo check --no-default-features --all-targets --locked

  publish:
    name: Publish crates.io packages
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "bevy_assets_hmr") | .version')"
          expected_tag="v${package_version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected_tag" >&2
            exit 1
          fi

      - name: Publish derive crate when needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          derive_version="$(cargo metadata --manifest-path bevy_assets_hmr_derive/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[0].version')"
          derive_url="https://crates.io/api/v1/crates/bevy_assets_hmr_derive/${derive_version}"
          if curl --fail --silent --show-error --location "$derive_url" >/dev/null; then
            echo "bevy_assets_hmr_derive ${derive_version} is already published"
          else
            cargo publish --manifest-path bevy_assets_hmr_derive/Cargo.toml
          fi

      - name: Wait for derive crate index propagation
        shell: bash
        run: |
          set -euo pipefail
          derive_version="$(cargo metadata --manifest-path bevy_assets_hmr_derive/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[0].version')"
          derive_url="https://crates.io/api/v1/crates/bevy_assets_hmr_derive/${derive_version}"
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --location "$derive_url" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for ${derive_url}" >&2
          exit 1

      - name: Package and publish main crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo package --locked
          cargo publish --locked
